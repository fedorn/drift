<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #c8c8d8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chrome {
      background: rgba(12, 12, 20, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
      backdrop-filter: blur(20px);
    }

    .toolbar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 8px;
    }

    .nav-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.7);
    }

    .nav-btn:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .input-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0 16px;
      height: 36px;
      transition: all 0.3s;
    }

    .input-bar:focus-within {
      border-color: rgba(160, 120, 255, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 20px rgba(160, 120, 255, 0.1);
    }

    .input-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #e0e0f0;
      font-size: 14px;
      font-family: inherit;
    }

    .input-bar input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .loading-line {
      height: 2px;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    .loading-line.active {
      background: rgba(160, 120, 255, 0.1);
    }

    .loading-line.active::after {
      content: '';
      position: absolute;
      left: -30%;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(160, 120, 255, 0.8), rgba(120, 200, 255, 0.8), transparent);
      animation: drift-load 1.2s ease-in-out infinite;
    }

    @keyframes drift-load {
      0% { left: -30%; }
      100% { left: 100%; }
    }

    .content-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .page-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #0a0a0f;
    }

    .lang-toggle {
      display: flex;
      gap: 2px;
    }

    .lang-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.25);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .lang-btn:hover {
      color: rgba(255, 255, 255, 0.5);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .lang-btn.active {
      color: rgba(200, 180, 255, 0.8);
      border-color: rgba(160, 120, 255, 0.4);
      background: rgba(160, 120, 255, 0.08);
    }

    .status-bar {
      background: rgba(12, 12, 20, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding: 3px 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="chrome">
    <div class="toolbar">
      <button class="nav-btn" id="btn-back" disabled title="Back">&#9664;</button>
      <button class="nav-btn" id="btn-forward" disabled title="Forward">&#9654;</button>
      <button class="nav-btn" id="btn-home" title="Home">&#9673;</button>
      <div class="input-bar">
        <input type="text" id="input" placeholder="type a place, concept, feeling, question, memory..." autofocus>
      </div>
      <div class="lang-toggle" id="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
      </div>
    </div>
    <div class="loading-line" id="loading-line"></div>
  </div>

  <div class="content-area">
    <iframe class="page-frame" id="page-frame" sandbox="allow-same-origin allow-scripts"></iframe>
  </div>

  <div class="status-bar">
    <span id="status-text">ready</span>
    <span>drift v1.0</span>
  </div>

  <script>
    const input = document.getElementById('input');
    const pageFrame = document.getElementById('page-frame');
    const loadingLine = document.getElementById('loading-line');
    const btnBack = document.getElementById('btn-back');
    const btnForward = document.getElementById('btn-forward');
    const statusText = document.getElementById('status-text');
    const langToggle = document.getElementById('lang-toggle');

    let navHistory = [];
    let historyIndex = -1;
    let currentDest = '';
    let isLoading = false;
    let isOnLanding = true;
    let currentLang = new URLSearchParams(window.location.search).get('lang') === 'ru' ? 'ru' : 'en';

    const placeholders = {
      en: 'type a place, concept, feeling, question, memory...',
      ru: 'место, чувство, вопрос, воспоминание, идея...',
    };

    function updateNavButtons() {
      btnBack.disabled = historyIndex <= 0;
      btnForward.disabled = historyIndex >= navHistory.length - 1;
    }

    function updateLangButtons() {
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === currentLang);
      });
      input.placeholder = placeholders[currentLang];
    }

    function updateUrl() {
      if (isOnLanding) {
        const params = currentLang === 'ru' ? '?lang=ru' : window.location.pathname;
        window.history.replaceState({}, '', params);
      }
    }

    function stripFences(s) {
      return s.replace(/^```[\w]*\n?/, '').replace(/\n?```\s*$/, '');
    }

    function streamSSE(url, opts = {}) {
      return new Promise((resolve, reject) => {
        let html = '';
        let processed = 0;

        function processBuffer(text) {
          const chunk = text.slice(processed);
          processed = text.length;
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const data = JSON.parse(line.slice(6));
              if (data.error) { reject(new Error(data.error)); return; }
              if (data.done) continue;
              if (data.html) {
                html += data.html;
                statusText.textContent = 'rendering...';
              }
            } catch (e) {
              if (e.message && !e.message.includes('JSON')) { reject(e); return; }
            }
          }
          renderPage(stripFences(html));
        }

        const xhr = new XMLHttpRequest();
        xhr.open(opts.method || 'GET', url);
        if (opts.method === 'POST') xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onprogress = () => processBuffer(xhr.responseText);
        xhr.onload = () => {
          processBuffer(xhr.responseText);
          resolve(stripFences(html));
        };
        xhr.onerror = () => reject(new Error('Network error'));

        xhr.send(opts.body ? JSON.stringify(opts.body) : null);
      });
    }

    async function loadLanding(lang) {
      if (isLoading) return;
      isLoading = true;
      isOnLanding = true;
      currentLang = lang;
      currentDest = '';
      input.value = '';
      document.title = 'Drift';
      loadingLine.classList.add('active');
      statusText.textContent = currentLang === 'ru' ? 'создаём пространство...' : 'generating landing...';
      langToggle.style.display = '';
      updateLangButtons();
      updateUrl();

      let html = '';
      try {
        html = await streamSSE(`/api/landing?lang=${lang}`);
      } catch (err) {
        html = `<html><body style="font-family:sans-serif;padding:60px;background:#0a0a0f;color:#c8c8d8;text-align:center;">
          <h1 style="color:rgba(160,120,255,0.7);font-weight:300;">drift</h1>
          <p style="color:rgba(255,255,255,0.3);margin-top:16px;">Could not generate landing</p>
          <p style="color:rgba(255,255,255,0.15);margin-top:8px;">${err.message}</p>
        </body></html>`;
      }

      renderPage(html, true);
      loadingLine.classList.remove('active');
      statusText.textContent = 'ready';
      isLoading = false;
    }

    async function navigate(destination, pushHistory = true) {
      if (isLoading || !destination.trim()) return;
      destination = destination.trim();

      isLoading = true;
      isOnLanding = false;
      input.value = destination;
      currentDest = destination;
      document.title = `${destination} — Drift`;
      loadingLine.classList.add('active');
      statusText.textContent = 'entering space...';

      if (pushHistory) {
        navHistory = navHistory.slice(0, historyIndex + 1);
        navHistory.push(destination);
        historyIndex = navHistory.length - 1;
        window.history.replaceState({}, '', '#' + encodeURIComponent(destination));
      }
      updateNavButtons();

      let html = '';
      const origin = historyIndex > 0 ? navHistory[historyIndex - 1] : null;

      try {
        html = await streamSSE('/api/navigate', { method: 'POST', body: { destination, origin, lang: currentLang } });
      } catch (err) {
        html = `<html><body style="font-family:sans-serif;padding:60px;background:#0a0a0f;color:#c8c8d8;text-align:center;">
          <h1 style="color:rgba(160,120,255,0.7);font-weight:300;">Lost in the void</h1>
          <p style="color:rgba(255,255,255,0.3);margin-top:16px;">Could not reach "${destination}"</p>
          <p style="color:rgba(255,255,255,0.15);margin-top:8px;">${err.message}</p>
        </body></html>`;
      }

      renderPage(html, true);
      loadingLine.classList.remove('active');
      statusText.textContent = currentDest;
      isLoading = false;
    }

    function renderPage(html, final = false) {
      const doc = pageFrame.contentDocument;
      doc.open();
      doc.write(html);
      if (final) {
        doc.write('<style>html, body { overflow-y: auto !important; height: auto !important; min-height: 100vh; }</style>');
        doc.close();
      }

      if (final) {
        doc.addEventListener('click', e => {
          const a = e.target.closest('[href]');
          if (a) {
            e.preventDefault();
            const href = a.getAttribute('href');
            if (href && href !== '#') {
              navigate(href);
            }
          }
        });
      }
    }

    // Events
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') navigate(input.value);
    });

    btnBack.addEventListener('click', () => {
      if (historyIndex > 0) {
        historyIndex--;
        navigate(navHistory[historyIndex], false);
      }
    });

    btnForward.addEventListener('click', () => {
      if (historyIndex < navHistory.length - 1) {
        historyIndex++;
        navigate(navHistory[historyIndex], false);
      }
    });

    document.getElementById('btn-home').addEventListener('click', () => {
      navHistory = [];
      historyIndex = -1;
      updateNavButtons();
      loadLanding(currentLang);
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.lang !== currentLang) {
          loadLanding(btn.dataset.lang);
        }
      });
    });

    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'l') {
        e.preventDefault();
        input.focus();
        input.select();
      }
    });

    // Init
    (() => {
      updateLangButtons();
      const hash = decodeURIComponent(window.location.hash.slice(1));
      if (hash) {
        navigate(hash);
      } else {
        loadLanding(currentLang);
      }
    })();
  </script>
</body>
</html>
